name: HOL Plugin Scanner

# Quality and security gate for awesome-codex-plugins listing.
# Required: score >= 80/100, no critical/high findings, workflow on main.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: HOL Plugin Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@8f0a503ca2a70c1968a9a883e11fdff5737b7909 # v1.2.514
        with:
          plugin_dir: "."
          mode: scan
          fail_on_severity: none
          format: text
          upload_sarif: false
          write_step_summary: true
